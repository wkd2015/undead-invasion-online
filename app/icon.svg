<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Undead Invasion">
  <defs>
    <linearGradient id="ui-cross" x1="6" y1="6" x2="26" y2="26" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#A78BFA"/>
      <stop offset="0.55" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#F43F5E"/>
    </linearGradient>
    <filter id="ui-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- App tile background -->
  <rect width="32" height="32" rx="8" fill="#0F0F23"/>
  <rect width="32" height="32" rx="8" fill="none" stroke="#27272A" stroke-width="1"/>
  <!-- Crosshair + reticle (readable at 16px) -->
  <g filter="url(#ui-glow)" stroke-linecap="round" stroke-linejoin="round">
    <path d="M16 5v5M16 22v5M5 16h5M22 16h5" stroke="url(#ui-cross)" stroke-width="2.25"/>
    <circle cx="16" cy="16" r="6" fill="none" stroke="url(#ui-cross)" stroke-width="1.75" opacity="0.95"/>
    <circle cx="16" cy="16" r="2.25" fill="#F43F5E"/>
  </g>
</svg>
